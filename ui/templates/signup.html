<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Crossposter Agent</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="icon" type="image/svg+xml" href="/static/images/logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem;">
  <div class="narrow" style="width: 100%; max-width: 400px;">
    <div style="text-align: center; margin-bottom: 2.5rem;">
      <a class="brand" href="/" style="justify-content: center;">
        <span class="brand-mark" style="width: 40px; height: 40px;"></span>
        <div class="wordmark-block">
          <span class="wm-name" style="font-size: 24px;">Crossposter</span>
          <span class="wm-sub" style="font-size: 11px; letter-spacing: 3px;">Agent</span>
        </div>
      </a>
    </div>

    <section class="panel">
      <h1 style="text-align: center; font-size: 1.5rem; margin-bottom: 0.5rem;">Create Account</h1>
      <p class="muted" style="text-align:center; margin-bottom:2rem;">Join the intelligent publishing network.</p>

      {{if .Error}}<div class="panel status-failed" style="padding: 0.75rem; font-size: 0.875rem; margin-bottom: 1.5rem;">{{.Error}}</div>{{end}}

      <form method="post" action="/signup">
        <div class="form-group">
          <label>Username</label>
          <input type="text" name="username" required placeholder="johndoe">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn" style="width:100%; height: 48px; font-size: 1rem; margin-top: 1rem;">Sign Up</button>
      </form>

      <div style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border); text-align: center;">
        <p class="muted text-small">Already have an account? <a href="/login" style="color:var(--primary); font-weight:600;">Sign in here</a></p>
      </div>
    </section>
  </div>
</body>
</html>
